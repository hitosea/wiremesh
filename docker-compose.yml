services:
  wiremesh:
    image: ghcr.io/hitosea/wiremesh:latest
    build:
      context: .
      args:
        AGENT_VERSION: ${AGENT_VERSION:-dev}
    ports:
      - "3456:3000"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3456}
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
